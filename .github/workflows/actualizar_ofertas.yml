name: Actualizar ofertas cada 4 horas

on:
  schedule:
    # Cada 4 horas (UTC). GitHub puede retrasar unos minutos la ejecución.
    - cron: "0 */4 * * *"
  workflow_dispatch: {} # permite ejecutarlo manualmente desde la pestaña Actions

permissions:
  contents: write

concurrency:
  group: actualizar-ofertas
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Buscar y filtrar ofertas
        run: python job_hunter.py

      - name: Guardar cambios en el repositorio
        run: |
          git config user.name "cazador-de-empleos[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add data docs
          if git diff --cached --quiet; then
            echo "Sin cambios en esta corrida."
          else
            git commit -m "Actualización automática de ofertas ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
